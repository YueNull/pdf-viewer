<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Meiryo, sans-serif;
      background: #c8b89a;
      color: #2a2a2a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── メニューバー ── */
    .menubar {
      display: flex;
      align-items: center;
      background: #e8d8c0;
      border-bottom: 1px solid #a09070;
      padding: 0 8px;
      height: 28px;
      flex-shrink: 0;
    }
    .menubar-item { padding: 4px 10px; font-size: 12px; cursor: pointer; border-radius: 3px; }
    .menubar-item:hover { background: #d0c0a8; }

    /* ── ツールバー ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #ddd0b8;
      border-bottom: 1px solid #a09070;
      padding: 4px 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .tb-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #e8d8c0;
      border: 1px solid #a09070;
      border-radius: 3px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .tb-btn:hover { background: #f0e0c8; }
    .tb-btn:active { background: #c8b898; }
    .tb-btn.primary { background: #4a7cb8; color: #fff; border-color: #3a6ca8; }
    .tb-btn.primary:hover { background: #5a8cc8; }
    .tb-sep { width: 1px; height: 22px; background: #a09070; margin: 0 4px; }
    .zoom-ctrl { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .zoom-select {
      background: #e8d8c0;
      border: 1px solid #a09070;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── 前回フォルダ復元バナー ── */
    .restore-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 12px;
      background: #d0e8d0;
      border-bottom: 1px solid #90b890;
      font-size: 11px;
      flex-shrink: 0;
    }
    .restore-bar.hidden { display: none; }
    .restore-name { font-weight: 600; color: #3a6a3a; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .restore-btn {
      padding: 3px 10px;
      background: #4a8a4a;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    .restore-btn:hover { background: #5a9a5a; }
    .restore-dismiss { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 0 4px; }

    /* ── メインレイアウト ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── 左サイドバー ── */
    .sidebar {
      width: 240px;
      min-width: 140px;
      background: #e0ceb4;
      border-right: 2px solid #a09070;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: #cfc0a0;
      border-bottom: 1px solid #a09070;
      font-size: 11px;
      font-weight: 600;
      color: #4a3a20;
      flex-shrink: 0;
    }
    .folder-path {
      padding: 4px 10px;
      font-size: 10px;
      color: #6a5a40;
      background: #d8c8a8;
      border-bottom: 1px solid #b0a080;
      min-height: 24px;
      word-break: break-all;
      line-height: 1.4;
    }

    /* ── ツリービュー ── */
    .tree-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 4px 0;
    }
    .tree-list::-webkit-scrollbar { width: 6px; height: 6px; }
    .tree-list::-webkit-scrollbar-track { background: #d0c0a0; }
    .tree-list::-webkit-scrollbar-thumb { background: #a09070; border-radius: 3px; }
    .tree-node {
      display: flex;
      align-items: center;
      height: 22px;
      cursor: pointer;
      white-space: nowrap;
      color: #3a2a10;
      padding-right: 10px;
      border-left: 2px solid transparent;
      transition: background 0.1s;
      min-width: 100%;
    }
    .tree-node:hover { background: rgba(0,0,0,0.09); }
    .tree-node.active-file { background: #4a7cb8; color: #fff; border-left-color: #2a5c98; }
    .tree-node.loading-node { opacity: 0.5; pointer-events: none; }
    .tree-indent { display: inline-block; width: 14px; flex-shrink: 0; }
    .tree-toggle { width: 14px; text-align: center; font-size: 9px; color: #7a6a50; flex-shrink: 0; font-family: monospace; font-weight: bold; }
    .tree-node.active-file .tree-toggle { color: #cce; }
    .tree-icon { font-size: 13px; margin: 0 3px; flex-shrink: 0; }
    .tree-label { font-size: 11px; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .tree-pages { font-size: 9px; opacity: 0.55; margin-left: 4px; flex-shrink: 0; }
    .tree-node.active-file .tree-pages { opacity: 0.75; }
    .sidebar-empty { padding: 20px 10px; text-align: center; font-size: 11px; color: #8a7a60; line-height: 1.7; }

    /* ── 右コンテンツ ── */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #c8b89a; }
    .content-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: #d8c8a8;
      border-bottom: 1px solid #a09070;
      flex-shrink: 0;
    }
    .ct-info { font-size: 11px; color: #5a4a30; }
    .ct-spacer { flex: 1; }

    /* ── サムネイルグリッド ── */
    .thumb-grid {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 16px;
    }
    .thumb-grid::-webkit-scrollbar { width: 8px; }
    .thumb-grid::-webkit-scrollbar-track { background: #b8a888; }
    .thumb-grid::-webkit-scrollbar-thumb { background: #8a7a60; border-radius: 4px; }
    .thumb-card { display: flex; flex-direction: column; align-items: center; cursor: pointer; gap: 4px; }
    .thumb-card:hover .thumb-frame { border-color: #4a7cb8; box-shadow: 0 2px 12px rgba(74,124,184,0.4); }
    .thumb-frame {
      background: #fff;
      border: 2px solid #9a8a70;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .thumb-frame canvas { display: block; }
    .thumb-frame .thumb-loading { position: absolute; inset: 0; background: #f5f0e8; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #888; }
    .thumb-label { font-size: 10px; color: #5a4a30; text-align: center; }
    .content-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #8a7a60; }
    .content-empty .big { font-size: 56px; }
    .content-empty p { font-size: 13px; line-height: 1.6; text-align: center; }

    /* ── リサイズハンドル ── */
    .resize-handle { width: 4px; cursor: col-resize; background: #a09070; flex-shrink: 0; transition: background 0.15s; }
    .resize-handle:hover { background: #4a7cb8; }

    /* ════════════════════════════════════════════
       全画面モーダル
    ════════════════════════════════════════════ */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 100; display: flex; flex-direction: column; align-items: center; }
    .modal-overlay.hidden { display: none; }

    .modal-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 6px 14px;
      background: #1e1e2e;
      color: #e0e0e0;
      flex-shrink: 0;
    }
    .modal-title { font-size: 12px; color: #aaa; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modal-nav { display: flex; align-items: center; gap: 5px; }
    .modal-btn { background: #3a3a4a; border: 1px solid #5a5a6a; color: #e0e0e0; border-radius: 4px; padding: 3px 9px; font-size: 12px; cursor: pointer; }
    .modal-btn:hover { background: #4a4a5a; }
    .modal-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .modal-close { background: #c03030; border: none; color: #fff; border-radius: 4px; padding: 4px 12px; font-size: 13px; cursor: pointer; font-weight: 700; }
    .modal-close:hover { background: #e04040; }
    .modal-page-jump { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #ccc; }
    .modal-page-input { width: 48px; text-align: center; background: #3a3a4a; border: 1px solid #6a6a7a; color: #e0e0e0; border-radius: 4px; padding: 3px 4px; font-size: 12px; }
    .modal-page-input:focus { outline: none; border-color: #4a7cb8; }
    .modal-page-total { color: #888; }

    /* 注釈ツールバー */
    .anno-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 5px 14px;
      background: #2a2a3e;
      border-bottom: 1px solid #3a3a50;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .anno-toolbar-label { font-size: 11px; color: #888; white-space: nowrap; }
    .anno-sep { width: 1px; height: 20px; background: #3a3a50; margin: 0 2px; }
    .anno-tool-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      background: #3a3a50;
      border: 1px solid #5a5a70;
      border-radius: 4px;
      color: #ccc;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .anno-tool-btn:hover { background: #4a4a60; }
    .anno-tool-btn.active { background: #4a7cb8; border-color: #6a9cd8; color: #fff; }
    .anno-color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .anno-color-swatch:hover { border-color: #fff; }
    .anno-color-swatch.active { border-color: #fff; box-shadow: 0 0 0 2px #4a7cb8; }
    .anno-clear-btn {
      margin-left: auto;
      padding: 3px 9px;
      background: #6a2020;
      border: 1px solid #8a3030;
      border-radius: 4px;
      color: #fcc;
      font-size: 11px;
      cursor: pointer;
    }
    .anno-clear-btn:hover { background: #8a3030; }

    /* モーダルボディ */
    .modal-body {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
    }
    .modal-canvas-wrap { position: relative; display: inline-block; flex-shrink: 0; }
    #modal-canvas { display: block; background: #fff; box-shadow: 0 4px 32px rgba(0,0,0,0.6); }
    #anno-canvas {
      position: absolute;
      top: 0; left: 0;
      cursor: crosshair;
      touch-action: none;
    }
    #anno-canvas.tool-select { cursor: default; }
    #anno-canvas.tool-eraser { cursor: cell; }

    /* コメントポップアップ */
    .comment-popup {
      position: absolute;
      background: #fff;
      border: 1px solid #aaa;
      border-radius: 6px;
      padding: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
    }
    .comment-popup.hidden { display: none; }
    .comment-popup textarea {
      width: 200px;
      height: 70px;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px;
      font-size: 12px;
      resize: none;
      font-family: inherit;
    }
    .comment-popup-btns { display: flex; gap: 6px; justify-content: flex-end; }
    .comment-popup-btns button { padding: 3px 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 11px; cursor: pointer; }
    .comment-ok { background: #4a7cb8; color: #fff; border-color: #3a6ca8 !important; }

    /* コメントピン（注釈アイコン） */
    .comment-pin {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      transition: transform 0.1s;
    }
    .comment-pin:hover { transform: rotate(-45deg) scale(1.2); }
    .comment-pin-label {
      position: absolute;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: pre-wrap;
      max-width: 200px;
      pointer-events: none;
      z-index: 10;
      display: none;
    }
    .comment-pin:hover + .comment-pin-label,
    .comment-pin:focus + .comment-pin-label { display: block; }

    /* モーダル内ズームラベル */
    .modal-zoom-label-span { font-size: 12px; min-width: 36px; text-align: center; }
  </style>
</head>
<body>

<!-- メニューバー -->
<div class="menubar">
  <div class="menubar-item">ファイル(F)</div>
  <div class="menubar-item">表示(V)</div>
  <div class="menubar-item">ヘルプ(H)</div>
</div>

<!-- ツールバー -->
<div class="toolbar">
  <button class="tb-btn primary" id="btn-open-folder">📁 フォルダを開く</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-upload-files">➕ PDFを追加</button>
  <input type="file" id="file-input" accept=".pdf" multiple style="display:none">
  <div class="tb-sep"></div>
  <div class="zoom-ctrl">
    <span style="font-size:12px;">サムネイルサイズ</span>
    <select class="zoom-select" id="thumb-size-select">
      <option value="80">小</option>
      <option value="120" selected>中</option>
      <option value="160">大</option>
      <option value="200">特大</option>
    </select>
  </div>
</div>

<!-- 前回フォルダ復元バナー -->
<div class="restore-bar hidden" id="restore-bar">
  <span>📂 前回のフォルダ：</span>
  <span class="restore-name" id="restore-name"></span>
  <button class="restore-btn" id="restore-btn">再度開く</button>
  <button class="restore-dismiss" id="restore-dismiss" title="閉じる">✕</button>
</div>

<!-- メイン -->
<div class="main">

  <!-- 左ツリー -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>📂 ファイル一覧</span>
      <span id="file-count" style="font-weight:normal;opacity:0.7;"></span>
    </div>
    <div class="folder-path" id="folder-path">— フォルダ未選択 —</div>
    <div class="tree-list" id="tree-list">
      <div class="sidebar-empty">
        「フォルダを開く」をクリックして<br>PDFが含まれるフォルダを選択<br><br>
        または「PDFを追加」から<br>ファイルを個別に選択
      </div>
    </div>
  </div>

  <div class="resize-handle" id="resize-handle"></div>

  <!-- 右コンテンツ -->
  <div class="content">
    <div class="content-toolbar" id="content-toolbar" style="display:none">
      <span class="ct-info" id="ct-filename">—</span>
      <span class="ct-info" id="ct-pages"></span>
      <span class="ct-spacer"></span>
      <span class="ct-info" style="font-size:10px;opacity:0.7;">サムネイルをクリックすると全画面表示</span>
    </div>
    <div class="content-empty" id="content-empty">
      <div class="big">📄</div>
      <p>左側からPDFファイルを選択すると<br>全ページのサムネイルが表示されます</p>
    </div>
    <div class="thumb-grid" id="thumb-grid" style="display:none"></div>
  </div>
</div>

<!-- ════ 全画面モーダル ════ -->
<div class="modal-overlay hidden" id="modal">

  <!-- ページナビ・ズームバー -->
  <div class="modal-bar">
    <span class="modal-title" id="modal-title"></span>
    <div class="modal-nav">
      <button class="modal-btn" id="modal-first">⏮</button>
      <button class="modal-btn" id="modal-prev">◀</button>
      <div class="modal-page-jump">
        <input type="number" class="modal-page-input" id="modal-page-input" min="1" value="1">
        <span class="modal-page-total">/ <span id="modal-page-total">—</span></span>
      </div>
      <button class="modal-btn" id="modal-next">▶</button>
      <button class="modal-btn" id="modal-last">⏭</button>
    </div>
    <div style="margin-left:12px;display:flex;gap:5px;align-items:center;">
      <button class="modal-btn" id="modal-zoom-out">－</button>
      <span class="modal-zoom-label-span" id="modal-zoom-label">100%</span>
      <button class="modal-btn" id="modal-zoom-in">＋</button>
    </div>
    <button class="modal-close" id="modal-close">✕ 閉じる</button>
  </div>

  <!-- 注釈ツールバー -->
  <div class="anno-toolbar" id="anno-toolbar">
    <span class="anno-toolbar-label">ツール：</span>
    <button class="anno-tool-btn active" id="tool-select" data-tool="select">▶ 選択</button>
    <div class="anno-sep"></div>
    <span class="anno-toolbar-label">ハイライト：</span>
    <div class="anno-color-swatch active" data-color="#faee50" style="background:#faee50" title="黄色" id="swatch-0"></div>
    <div class="anno-color-swatch" data-color="#90ee90" style="background:#90ee90" title="緑" id="swatch-1"></div>
    <div class="anno-color-swatch" data-color="#87ceeb" style="background:#87ceeb" title="青" id="swatch-2"></div>
    <div class="anno-color-swatch" data-color="#ffb6c1" style="background:#ffb6c1" title="ピンク" id="swatch-3"></div>
    <div class="anno-color-swatch" data-color="#ffa07a" style="background:#ffa07a" title="オレンジ" id="swatch-4"></div>
    <div class="anno-sep"></div>
    <button class="anno-tool-btn" id="tool-comment" data-tool="comment">💬 コメント</button>
    <button class="anno-tool-btn" id="tool-eraser" data-tool="eraser">🧹 消しゴム</button>
    <button class="anno-clear-btn" id="anno-clear-page">🗑 このページを消去</button>
  </div>

  <!-- キャンバス -->
  <div class="modal-body">
    <div class="modal-canvas-wrap" id="modal-canvas-wrap">
      <canvas id="modal-canvas"></canvas>
      <canvas id="anno-canvas"></canvas>
      <!-- コメントピンはJSで動的追加 -->
    </div>
  </div>

  <!-- コメント入力ポップアップ -->
  <div class="comment-popup hidden" id="comment-popup">
    <textarea id="comment-text" placeholder="コメントを入力…"></textarea>
    <div class="comment-popup-btns">
      <button id="comment-cancel">キャンセル</button>
      <button class="comment-ok" id="comment-ok">追加</button>
    </div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  /* ══════════════════════════════════════════════════
     IndexedDB：前回フォルダハンドルの保存・復元
  ══════════════════════════════════════════════════ */
  const DB_NAME = 'pdf-viewer-db', DB_VER = 1, STORE = 'handles';
  let db = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
      req.onsuccess = e => resolve(e.target.result);
      req.onerror   = e => reject(e.target.error);
    });
  }
  async function saveLastHandle(handle) {
    if (!db) return;
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(handle, 'lastDir');
  }
  async function loadLastHandle() {
    if (!db) return null;
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get('lastDir');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror   = () => resolve(null);
    });
  }

  /* ══════════════════════════════════════════════════
     注釈ストレージ（localStorage）
  ══════════════════════════════════════════════════ */
  // 構造: { [filename]: { [page]: [ {type,x,y,w,h,color,text}, ... ] } }
  let annoStore = {};

  function loadAnnoStore() {
    try { annoStore = JSON.parse(localStorage.getItem('pdf_annotations') || '{}'); } catch { annoStore = {}; }
  }
  function saveAnnoStore() {
    try { localStorage.setItem('pdf_annotations', JSON.stringify(annoStore)); } catch(e) { console.warn(e); }
  }
  function getAnnotations(filename, page) {
    return (annoStore[filename] || {})[page] || [];
  }
  function setAnnotations(filename, page, list) {
    if (!annoStore[filename]) annoStore[filename] = {};
    annoStore[filename][page] = list;
    saveAnnoStore();
  }

  /* ══════════════════════════════════════════════════
     状態
  ══════════════════════════════════════════════════ */
  let treeRoot   = null;
  let activeNode = null;
  let thumbSize  = 120;
  let modalPage  = 1;
  let modalRenderTask = null;
  const modalZoomSteps = [0.5, 0.75, 1, 1.25, 1.5, 2, 3];
  let modalZoomIdx = 2;

  // 注釈ツール状態
  let annoTool  = 'select';   // 'select' | 'highlight' | 'comment' | 'eraser'
  let annoColor = '#faee50';
  let drawing   = false;
  let drawStart = null;

  /* ══════════════════════════════════════════════════
     DOM参照
  ══════════════════════════════════════════════════ */
  const treeListEl     = document.getElementById('tree-list');
  const fileCountEl    = document.getElementById('file-count');
  const folderPathEl   = document.getElementById('folder-path');
  const contentToolbar = document.getElementById('content-toolbar');
  const contentEmpty   = document.getElementById('content-empty');
  const thumbGrid      = document.getElementById('thumb-grid');
  const ctFilename     = document.getElementById('ct-filename');
  const ctPages        = document.getElementById('ct-pages');
  const modal          = document.getElementById('modal');
  const modalTitle     = document.getElementById('modal-title');
  const modalPageInput = document.getElementById('modal-page-input');
  const modalPageTotal = document.getElementById('modal-page-total');
  const modalCanvas    = document.getElementById('modal-canvas');
  const modalCtx       = modalCanvas.getContext('2d');
  const annoCanvas     = document.getElementById('anno-canvas');
  const annoCtx        = annoCanvas.getContext('2d');
  const canvasWrap     = document.getElementById('modal-canvas-wrap');
  const commentPopup   = document.getElementById('comment-popup');

  /* ══════════════════════════════════════════════════
     起動時：IndexedDB初期化 & 前回フォルダ確認
  ══════════════════════════════════════════════════ */
  (async () => {
    loadAnnoStore();
    try { db = await openDB(); } catch(e) { console.warn('IndexedDB利用不可', e); }
    const lastHandle = await loadLastHandle();
    if (lastHandle) {
      document.getElementById('restore-name').textContent = lastHandle.name;
      document.getElementById('restore-bar').classList.remove('hidden');
      document.getElementById('restore-btn').onclick = () => restoreFolder(lastHandle);
    }
  })();

  document.getElementById('restore-dismiss').onclick = () => {
    document.getElementById('restore-bar').classList.add('hidden');
  };

  async function restoreFolder(dirHandle) {
    try {
      // 権限を再要求（1クリックで済む）
      const perm = await dirHandle.requestPermission({ mode: 'read' });
      if (perm !== 'granted') return;
      document.getElementById('restore-bar').classList.add('hidden');
      await openFolderHandle(dirHandle);
    } catch(e) { console.error(e); }
  }

  /* ══════════════════════════════════════════════════
     フォルダを開く
  ══════════════════════════════════════════════════ */
  document.getElementById('btn-open-folder').addEventListener('click', async () => {
    if (!window.showDirectoryPicker) {
      alert('お使いのブラウザはフォルダ選択APIに対応していません。\nChromeまたはEdgeをご利用ください。\nまたは「PDFを追加」から個別にファイルを選択してください。');
      return;
    }
    try {
      const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
      await openFolderHandle(dirHandle);
      await saveLastHandle(dirHandle);
      document.getElementById('restore-bar').classList.add('hidden');
    } catch(e) { if (e.name !== 'AbortError') console.error(e); }
  });

  async function openFolderHandle(dirHandle) {
    folderPathEl.textContent = dirHandle.name;
    treeRoot = makeDirNode(dirHandle.name, dirHandle, true);
    activeNode = null;
    await scanDir(treeRoot);
    countFiles(treeRoot);
    renderTreeList();
    contentEmpty.style.display = 'flex';
    contentToolbar.style.display = 'none';
    thumbGrid.style.display = 'none';
  }

  /* ══════════════════════════════════════════════════
     ツリーノード構造
  ══════════════════════════════════════════════════ */
  function makeDirNode(name, handle, expanded = false) {
    return { kind:'dir', name, handle, expanded, children: null, scanned: false };
  }
  function makeFileNode(name, handle) {
    return { kind:'file', name, handle, pdfDoc: null, pageCount: null };
  }

  async function scanDir(node) {
    if (node.scanned) return;
    node.scanned = true;
    const children = [];
    for await (const [name, handle] of node.handle.entries()) {
      if (handle.kind === 'directory') {
        children.push(makeDirNode(name, handle));
      } else if (handle.kind === 'file' && name.toLowerCase().endsWith('.pdf')) {
        children.push(makeFileNode(name, handle));
      }
    }
    children.sort((a, b) => {
      if (a.kind !== b.kind) return a.kind === 'dir' ? -1 : 1;
      return a.name.localeCompare(b.name, 'ja');
    });
    node.children = children;
  }

  function countFiles(root) {
    let count = 0;
    function walk(n) { if (n.kind === 'file') count++; if (n.children) n.children.forEach(walk); }
    if (root.children) root.children.forEach(walk);
    fileCountEl.textContent = count ? `${count} 件` : '';
  }

  /* ══════════════════════════════════════════════════
     手動でPDF追加
  ══════════════════════════════════════════════════ */
  document.getElementById('btn-upload-files').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change', async e => {
    const files = [...e.target.files].filter(f => f.name.toLowerCase().endsWith('.pdf'));
    e.target.value = '';
    if (!files.length) return;
    if (!treeRoot) {
      treeRoot = { kind:'dir', name:'追加ファイル', handle:null, expanded:true, children:[], scanned:true };
      folderPathEl.textContent = '手動追加';
    }
    for (const file of files) {
      if (!treeRoot.children.some(n => n.name === file.name)) {
        treeRoot.children.push({ kind:'file', name:file.name, handle:null, pdfDoc:null, pageCount:null, _file:file });
      }
    }
    countFiles(treeRoot);
    renderTreeList();
  });

  /* ══════════════════════════════════════════════════
     ツリー描画
  ══════════════════════════════════════════════════ */
  function renderTreeList() {
    treeListEl.innerHTML = '';
    if (!treeRoot) {
      treeListEl.innerHTML = `<div class="sidebar-empty">「フォルダを開く」をクリックして<br>PDFが含まれるフォルダを選択<br><br>または「PDFを追加」から<br>ファイルを個別に選択</div>`;
      return;
    }
    const children = treeRoot.children || [];
    if (!children.length) {
      treeListEl.innerHTML = `<div class="sidebar-empty">PDFファイルがありません</div>`;
      return;
    }
    renderTreeNodes(children, 0);
  }

  function renderTreeNodes(nodes, depth) {
    for (const node of nodes) {
      const row = document.createElement('div');
      row.className = 'tree-node' + (node === activeNode ? ' active-file' : '');

      for (let i = 0; i < depth; i++) {
        const sp = document.createElement('span'); sp.className = 'tree-indent'; row.appendChild(sp);
      }

      if (node.kind === 'dir') {
        const toggle = document.createElement('span');
        toggle.className = 'tree-toggle';
        toggle.textContent = (node.children && node.children.length) ? (node.expanded ? '▾' : '▸') : ' ';
        row.appendChild(toggle);

        const icon = document.createElement('span'); icon.className = 'tree-icon';
        icon.textContent = node.expanded ? '📂' : '📁';
        row.appendChild(icon);

        const label = document.createElement('span'); label.className = 'tree-label';
        label.textContent = node.name; label.title = node.name;
        row.appendChild(label);

        row.addEventListener('click', async () => {
          if (!node.scanned) { row.classList.add('loading-node'); await scanDir(node); }
          node.expanded = !node.expanded;
          renderTreeList();
        });
        treeListEl.appendChild(row);
        if (node.expanded && node.children && node.children.length)
          renderTreeNodes(node.children, depth + 1);

      } else {
        const toggle = document.createElement('span'); toggle.className = 'tree-toggle'; toggle.textContent = ' ';
        row.appendChild(toggle);

        const icon = document.createElement('span'); icon.className = 'tree-icon'; icon.textContent = '📄';
        row.appendChild(icon);

        const label = document.createElement('span'); label.className = 'tree-label';
        label.textContent = node.name; label.title = node.name;
        row.appendChild(label);

        if (node.pageCount) {
          const pg = document.createElement('span'); pg.className = 'tree-pages';
          pg.textContent = node.pageCount + 'p'; row.appendChild(pg);
        }
        row.addEventListener('click', () => selectFile(node));
        treeListEl.appendChild(row);
      }
    }
  }

  /* ══════════════════════════════════════════════════
     PDFファイル選択・サムネイル表示
  ══════════════════════════════════════════════════ */
  async function selectFile(node) {
    if (!node.pdfDoc) {
      try {
        const ab = node._file ? await node._file.arrayBuffer()
                              : await (await node.handle.getFile()).arrayBuffer();
        node.pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
        node.pageCount = node.pdfDoc.numPages;
      } catch(e) { console.warn('読み込み失敗:', node.name, e); return; }
    }
    activeNode = node;
    renderTreeList();
    ctFilename.textContent = node.name;
    ctPages.textContent = `${node.pageCount} ページ`;
    contentToolbar.style.display = 'flex';
    contentEmpty.style.display = 'none';
    thumbGrid.style.display = 'flex';
    thumbGrid.innerHTML = '';

    for (let p = 1; p <= node.pageCount; p++) {
      thumbGrid.appendChild(createThumbCard(node, p));
    }

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const card = entry.target;
          if (!card.dataset.rendered) { card.dataset.rendered = '1'; renderThumb(card, node, +card.dataset.page); }
        }
      });
    }, { root: thumbGrid, rootMargin: '200px' });
    thumbGrid.querySelectorAll('.thumb-card').forEach(c => observer.observe(c));
  }

  function createThumbCard(node, pageNum) {
    const card = document.createElement('div'); card.className = 'thumb-card'; card.dataset.page = pageNum;
    const frame = document.createElement('div'); frame.className = 'thumb-frame';
    frame.style.width = thumbSize + 'px';
    frame.style.height = Math.round(thumbSize * 1.414) + 'px';
    frame.innerHTML = `<div class="thumb-loading">...</div>`;
    const label = document.createElement('div'); label.className = 'thumb-label'; label.textContent = pageNum;
    card.appendChild(frame); card.appendChild(label);
    card.addEventListener('click', () => openModal(node, pageNum));
    return card;
  }

  async function renderThumb(card, node, pageNum) {
    const frame = card.querySelector('.thumb-frame');
    try {
      const page = await node.pdfDoc.getPage(pageNum);
      const vp0 = page.getViewport({ scale: 1 });
      const scale = thumbSize / vp0.width;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      frame.style.width = viewport.width + 'px'; frame.style.height = viewport.height + 'px';
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

      // 注釈を描画
      const annos = getAnnotations(node.name, pageNum);
      if (annos.length) {
        const tCtx = canvas.getContext('2d');
        drawAnnotationsOnCtx(tCtx, annos, viewport.width, viewport.height, true);
      }

      frame.innerHTML = ''; frame.appendChild(canvas);
    } catch(e) {
      frame.innerHTML = `<div class="thumb-loading" style="color:#c00">エラー</div>`;
    }
  }

  document.getElementById('thumb-size-select').addEventListener('change', e => {
    thumbSize = +e.target.value;
    if (activeNode) selectFile(activeNode);
  });

  /* ══════════════════════════════════════════════════
     注釈の描画（Canvas共通）
     annos: [{type,x,y,w,h,color,text}]  x,y,w,h は 0〜1 の比率
  ══════════════════════════════════════════════════ */
  function drawAnnotationsOnCtx(ctx, annos, W, H, small = false) {
    for (const a of annos) {
      if (a.type === 'highlight') {
        ctx.save();
        ctx.globalAlpha = 0.38;
        ctx.fillStyle = a.color;
        ctx.fillRect(a.x * W, a.y * H, a.w * W, a.h * H);
        ctx.restore();
      }
      // コメントはDOMピンで表示するのでcanvasには描かない
    }
  }

  /* ══════════════════════════════════════════════════
     全画面モーダル
  ══════════════════════════════════════════════════ */
  async function openModal(node, startPage) {
    modal._node = node;
    modalPage = startPage;
    modal.classList.remove('hidden');
    modalTitle.textContent = node.name;
    modalPageTotal.textContent = node.pageCount;
    modalPageInput.max = node.pageCount;
    await renderModalPage();
  }

  async function renderModalPage() {
    const node = modal._node;
    if (!node) return;
    if (modalRenderTask) { modalRenderTask.cancel(); modalRenderTask = null; }

    modalPageInput.value = modalPage;
    modalPageInput.max = node.pageCount;
    modalPageTotal.textContent = node.pageCount;
    document.getElementById('modal-zoom-label').textContent = Math.round(modalZoomSteps[modalZoomIdx] * 100) + '%';

    const page = await node.pdfDoc.getPage(modalPage);
    const viewport = page.getViewport({ scale: modalZoomSteps[modalZoomIdx] });
    const W = viewport.width, H = viewport.height;
    modalCanvas.width = W; modalCanvas.height = H;
    annoCanvas.width = W; annoCanvas.height = H;
    annoCanvas.style.width = W + 'px'; annoCanvas.style.height = H + 'px';

    modalRenderTask = page.render({ canvasContext: modalCtx, viewport });
    try { await modalRenderTask.promise; } catch(e) {}
    modalRenderTask = null;

    // 注釈をオーバーレイに描画
    redrawAnnoOverlay();
    updateModalBtns();
  }

  function redrawAnnoOverlay() {
    const node = modal._node;
    if (!node) return;
    const W = annoCanvas.width, H = annoCanvas.height;
    annoCtx.clearRect(0, 0, W, H);
    const annos = getAnnotations(node.name, modalPage);
    drawAnnotationsOnCtx(annoCtx, annos, W, H, false);
    updateCommentPins();
  }

  function updateCommentPins() {
    // 既存ピンを削除
    canvasWrap.querySelectorAll('.comment-pin, .comment-pin-label').forEach(el => el.remove());
    const node = modal._node;
    if (!node) return;
    const annos = getAnnotations(node.name, modalPage);
    const W = annoCanvas.width, H = annoCanvas.height;
    annos.filter(a => a.type === 'comment').forEach((a, i) => {
      const pin = document.createElement('div');
      pin.className = 'comment-pin';
      pin.style.background = a.color || '#ff9900';
      pin.style.left = (a.x * W - 12) + 'px';
      pin.style.top  = (a.y * H - 12) + 'px';
      pin.dataset.idx = i;

      const tip = document.createElement('div');
      tip.className = 'comment-pin-label';
      tip.textContent = a.text;
      tip.style.left = (a.x * W + 14) + 'px';
      tip.style.top  = (a.y * H - 8) + 'px';

      // 右クリックで削除
      pin.addEventListener('contextmenu', e => {
        e.preventDefault();
        const annos = getAnnotations(node.name, modalPage);
        const commentAnnos = annos.filter(a => a.type === 'comment');
        const target = commentAnnos[+pin.dataset.idx];
        const newList = annos.filter(a => a !== target);
        setAnnotations(node.name, modalPage, newList);
        redrawAnnoOverlay();
        refreshThumb(node, modalPage);
      });

      canvasWrap.appendChild(pin);
      canvasWrap.appendChild(tip);
    });
  }

  function updateModalBtns() {
    const total = modal._node ? modal._node.pageCount : 1;
    document.getElementById('modal-first').disabled = modalPage <= 1;
    document.getElementById('modal-prev').disabled  = modalPage <= 1;
    document.getElementById('modal-next').disabled  = modalPage >= total;
    document.getElementById('modal-last').disabled  = modalPage >= total;
  }

  function modalGoTo(p) {
    const total = modal._node ? modal._node.pageCount : 1;
    modalPage = Math.max(1, Math.min(total, p));
    renderModalPage();
  }

  modalPageInput.addEventListener('keydown', e => { if (e.key === 'Enter') { modalGoTo(parseInt(modalPageInput.value)||1); modalPageInput.blur(); } });
  modalPageInput.addEventListener('change', () => modalGoTo(parseInt(modalPageInput.value)||1));
  document.getElementById('modal-first').onclick = () => modalGoTo(1);
  document.getElementById('modal-prev').onclick  = () => modalGoTo(modalPage - 1);
  document.getElementById('modal-next').onclick  = () => modalGoTo(modalPage + 1);
  document.getElementById('modal-last').onclick  = () => modalGoTo(modal._node.pageCount);
  document.getElementById('modal-zoom-in').onclick  = () => { if (modalZoomIdx < modalZoomSteps.length-1) { modalZoomIdx++; renderModalPage(); } };
  document.getElementById('modal-zoom-out').onclick = () => { if (modalZoomIdx > 0) { modalZoomIdx--; renderModalPage(); } };
  document.getElementById('modal-close').onclick = () => {
    modal.classList.add('hidden');
    if (modalRenderTask) { modalRenderTask.cancel(); modalRenderTask = null; }
  };
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.add('hidden'); });

  /* ══════════════════════════════════════════════════
     注釈ツールバー制御
  ══════════════════════════════════════════════════ */
  function setAnnoTool(tool) {
    annoTool = tool;
    document.querySelectorAll('.anno-tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
    annoCanvas.className = `tool-${tool}`;
    // ハイライト色スウォッチはhighlight選択時のみ有効
  }
  document.getElementById('tool-select').addEventListener('click', () => setAnnoTool('select'));
  document.getElementById('tool-comment').addEventListener('click', () => setAnnoTool('comment'));
  document.getElementById('tool-eraser').addEventListener('click', () => setAnnoTool('eraser'));

  // ハイライト色スウォッチ
  document.querySelectorAll('.anno-color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.anno-color-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      annoColor = sw.dataset.color;
      setAnnoTool('highlight');
    });
  });

  // このページの注釈を消去
  document.getElementById('anno-clear-page').addEventListener('click', () => {
    const node = modal._node;
    if (!node) return;
    if (!confirm(`${modalPage}ページの注釈をすべて削除しますか？`)) return;
    setAnnotations(node.name, modalPage, []);
    redrawAnnoOverlay();
    refreshThumb(node, modalPage);
  });

  /* ══════════════════════════════════════════════════
     注釈キャンバスのマウスイベント
  ══════════════════════════════════════════════════ */
  function getCanvasPos(e) {
    const rect = annoCanvas.getBoundingClientRect();
    const scaleX = annoCanvas.width  / rect.width;
    const scaleY = annoCanvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top)  * scaleY
    };
  }

  annoCanvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const pos = getCanvasPos(e);
    if (annoTool === 'highlight') {
      drawing = true;
      drawStart = pos;
    } else if (annoTool === 'comment') {
      showCommentPopup(e, pos);
    } else if (annoTool === 'eraser') {
      eraseAt(pos);
    }
  });

  annoCanvas.addEventListener('mousemove', e => {
    if (!drawing || annoTool !== 'highlight') return;
    const pos = getCanvasPos(e);
    redrawAnnoOverlay();
    // ドラッグ中のプレビュー
    annoCtx.save();
    annoCtx.globalAlpha = 0.38;
    annoCtx.fillStyle = annoColor;
    const x = Math.min(drawStart.x, pos.x), y = Math.min(drawStart.y, pos.y);
    const w = Math.abs(pos.x - drawStart.x), h = Math.abs(pos.y - drawStart.y);
    annoCtx.fillRect(x, y, w, h);
    annoCtx.restore();
  });

  annoCanvas.addEventListener('mouseup', e => {
    if (!drawing || annoTool !== 'highlight') return;
    drawing = false;
    const pos = getCanvasPos(e);
    const W = annoCanvas.width, H = annoCanvas.height;
    const x = Math.min(drawStart.x, pos.x) / W;
    const y = Math.min(drawStart.y, pos.y) / H;
    const w = Math.abs(pos.x - drawStart.x) / W;
    const h = Math.abs(pos.y - drawStart.y) / H;
    if (w > 0.005 && h > 0.005) {
      const node = modal._node;
      const annos = getAnnotations(node.name, modalPage);
      annos.push({ type:'highlight', x, y, w, h, color: annoColor });
      setAnnotations(node.name, modalPage, annos);
      refreshThumb(node, modalPage);
    }
    redrawAnnoOverlay();
  });

  annoCanvas.addEventListener('mouseleave', () => {
    if (drawing) { drawing = false; redrawAnnoOverlay(); }
  });

  // 消しゴム：クリック位置の注釈を削除
  function eraseAt(pos) {
    const node = modal._node;
    if (!node) return;
    const W = annoCanvas.width, H = annoCanvas.height;
    const px = pos.x / W, py = pos.y / H;
    const annos = getAnnotations(node.name, modalPage);
    const newList = annos.filter(a => {
      if (a.type === 'highlight') {
        return !(px >= a.x && px <= a.x + a.w && py >= a.y && py <= a.y + a.h);
      }
      if (a.type === 'comment') {
        return !(Math.abs(px - a.x) < 0.03 && Math.abs(py - a.y) < 0.03);
      }
      return true;
    });
    setAnnotations(node.name, modalPage, newList);
    redrawAnnoOverlay();
    refreshThumb(node, modalPage);
  }

  /* ══════════════════════════════════════════════════
     コメントポップアップ
  ══════════════════════════════════════════════════ */
  let pendingCommentPos = null;

  function showCommentPopup(mouseEvent, canvasPos) {
    pendingCommentPos = canvasPos;
    const rect = modal.getBoundingClientRect();
    commentPopup.style.left = (mouseEvent.clientX - rect.left + 10) + 'px';
    commentPopup.style.top  = (mouseEvent.clientY - rect.top  + 10) + 'px';
    commentPopup.classList.remove('hidden');
    document.getElementById('comment-text').value = '';
    document.getElementById('comment-text').focus();
  }

  document.getElementById('comment-ok').addEventListener('click', () => {
    const text = document.getElementById('comment-text').value.trim();
    if (text && pendingCommentPos) {
      const node = modal._node;
      const W = annoCanvas.width, H = annoCanvas.height;
      const annos = getAnnotations(node.name, modalPage);
      annos.push({ type:'comment', x: pendingCommentPos.x / W, y: pendingCommentPos.y / H, text, color: '#ff9900' });
      setAnnotations(node.name, modalPage, annos);
      redrawAnnoOverlay();
      refreshThumb(node, modalPage);
    }
    commentPopup.classList.add('hidden');
    pendingCommentPos = null;
  });

  document.getElementById('comment-cancel').addEventListener('click', () => {
    commentPopup.classList.add('hidden');
    pendingCommentPos = null;
  });

  document.getElementById('comment-text').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('comment-ok').click(); }
    if (e.key === 'Escape') document.getElementById('comment-cancel').click();
  });

  /* ══════════════════════════════════════════════════
     サムネイルを注釈変更後に再描画
  ══════════════════════════════════════════════════ */
  function refreshThumb(node, pageNum) {
    const card = [...thumbGrid.querySelectorAll('.thumb-card')]
      .find(c => +c.dataset.page === pageNum);
    if (!card) return;
    card.dataset.rendered = '';
    renderThumb(card, node, pageNum);
  }

  /* ══════════════════════════════════════════════════
     キーボードショートカット
  ══════════════════════════════════════════════════ */
  document.addEventListener('keydown', e => {
    if (!modal.classList.contains('hidden')) {
      if (document.activeElement === modalPageInput || document.activeElement === document.getElementById('comment-text')) return;
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   modalGoTo(modalPage - 1);
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  modalGoTo(modalPage + 1);
      if (e.key === 'Escape') {
        if (!commentPopup.classList.contains('hidden')) document.getElementById('comment-cancel').click();
        else modal.classList.add('hidden');
      }
      if (e.ctrlKey && (e.key === '+' || e.key === '=')) { e.preventDefault(); document.getElementById('modal-zoom-in').click(); }
      if (e.ctrlKey && e.key === '-') { e.preventDefault(); document.getElementById('modal-zoom-out').click(); }
      if (e.key === 'h') setAnnoTool('highlight');
      if (e.key === 'c') setAnnoTool('comment');
      if (e.key === 'e') setAnnoTool('eraser');
      if (e.key === 's') setAnnoTool('select');
    }
  });

  /* ══════════════════════════════════════════════════
     サイドバー幅リサイズ
  ══════════════════════════════════════════════════ */
  const resizeHandle = document.getElementById('resize-handle');
  const sidebar = document.getElementById('sidebar');
  let resizing = false, startX = 0, startW = 0;
  resizeHandle.addEventListener('mousedown', e => {
    resizing = true; startX = e.clientX; startW = sidebar.offsetWidth;
    document.body.style.cursor = 'col-resize'; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    sidebar.style.width = Math.max(140, Math.min(400, startW + e.clientX - startX)) + 'px';
  });
  document.addEventListener('mouseup', () => { resizing = false; document.body.style.cursor = ''; });

  /* ══════════════════════════════════════════════════
     ドラッグ＆ドロップ
  ══════════════════════════════════════════════════ */
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', async e => {
    e.preventDefault();
    const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (!files.length) return;
    if (!treeRoot) {
      treeRoot = { kind:'dir', name:'追加ファイル', handle:null, expanded:true, children:[], scanned:true };
      folderPathEl.textContent = '手動追加';
    }
    for (const file of files) {
      if (!treeRoot.children.some(n => n.name === file.name))
        treeRoot.children.push({ kind:'file', name:file.name, handle:null, pdfDoc:null, pageCount:null, _file:file });
    }
    countFiles(treeRoot); renderTreeList();
  });
</script>
</body>
</html>
